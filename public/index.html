<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagina de login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">
    <header class="logo">
      <div class="logo-icon">|||</div>
      <h1>Biblioteca</h1>
    </header>

    <section class="card">
      <h2>Entrar na conta</h2>
      <p>Use seu e-mail e senha para acessar</p>

      <div class="tabs">
        <button class="active">Entrar</button>
        <button>Criar conta</button>
      </div>

      <div class="alert">
        ⓘ Preencha todos os campos.
      </div>

      <form>
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" />

        <label for="senha">Senha</label>
        <div class="password">
          <input type="password" id="senha" placeholder="••••••••" />
          
        </div>

        <div class="demo">
          <strong>Contas de demonstração:</strong>
          <p>📚 Bibliotecário: ana@biblioteca.com / 123456</p>
          <p>👤 Leitor: carlos@email.com / 123456</p>
        </div>

        <button type="submit" class="submit">Entrar</button>
      </form>
    </section>
  </main>

</body>
</html>
